name: "测试覆盖率"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  coverage:
    name: 生成测试覆盖率报告
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 安装 uv
      run: pip install uv

    - name: 安装依赖
      run: |
        uv sync --all-packages
        uv pip install pytest-cov

    - name: 运行测试并生成覆盖率
      run: |
        uv run pytest tests/unit/ \
          --cov=apps/service/src/video_sum_service \
          --cov=packages/core/src/video_sum_core \
          --cov=packages/infra/src/video_sum_infra \
          --cov-report=xml \
          --cov-report=term \
          -v

    - name: 上传到 Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: 上传覆盖率报告（Artifact）
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
