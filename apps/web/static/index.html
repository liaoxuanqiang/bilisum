    <script>
      // Set data-theme BEFORE CSS paints to eliminate white flash in dark mode.
      // Must run synchronously — no DOM APIs that yield.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var isDark = saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <style>
      :root { --bg-base: #121212; --bg-card: #202020; }
      :root[data-theme="light"] { --bg-base: #fafbfc; --bg-card: #ffffff; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-base); }
    </style>
